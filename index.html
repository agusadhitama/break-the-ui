<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Break The UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay"></div>

  <div class="container">
    <h1 class="glitch" data-text="Break The UI">Break The UI</h1>
    <p class="subtitle">The more you use it, the worse it gets.</p>

    <div class="buttons">
      <button>Click Me</button>
      <button>Don't Click Me</button>
      <button>Try It 😈</button>
    </div>

    <div class="chaos-bar">
      CHAOS: <span id="chaosValue">0</span>
    </div>

    <p class="hint">try typing something...</p>
  </div>

  <div id="systemMessage"></div>

  <script src="script.js"></script>
</body>
</html>
